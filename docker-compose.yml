services:
  redis:
    image: redis:7-alpine
    container_name: agent-redis
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  orchestrator:
    build: .
    container_name: agent-orchestrator
    restart: always
    command: python -m src.agents.orchestrator
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - AGENT_ROLE=orchestrator
    volumes:
      - ./src:/app/src
      - ./.env:/app/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  data-pipeline:
    build: .
    container_name: agent-data-pipeline
    restart: always
    command: python -m src.agents.data_pipeline_agent
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - AGENT_ROLE=data-pipeline
      - DATABASE_URL=${DATABASE_URL:-}
    volumes:
      - ./src:/app/src
      - ./.env:/app/.env
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  analytics:
    build: .
    container_name: agent-analytics
    restart: always
    command: python -m src.agents.analytics_agent
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - AGENT_ROLE=analytics
    volumes:
      - ./src:/app/src
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  code-gen:
    build: .
    container_name: agent-code-gen
    restart: always
    command: python -m src.agents.code_gen_agent
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - AGENT_ROLE=code-gen
    volumes:
      - ./src:/app/src
      - ./transform:/app/transform
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  reviewer:
    build: .
    container_name: agent-reviewer
    restart: always
    command: python -m src.agents.reviewer_agent
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - AGENT_ROLE=reviewer
    volumes:
      - ./src:/app/src
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
