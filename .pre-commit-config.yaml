repos:
- repo: local
  hooks:
  - id: check-agent-system
    name: AGENT_SYSTEM.md exists at root
    entry: python -c "import sys; sys.exit(0 if __import__('pathlib').Path('AGENT_SYSTEM.md').is_file() else 1)"
    language: system
    files: ^$
    always_run: true
    fail_fast: true
- repo: https://github.com/astral-sh/ruff-pre-commit
  rev: v0.9.0
  hooks:
  - id: ruff
    args: [--fix]
  - id: ruff-format
