name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  structure-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Verify required files and directories
      run: |
        test -f AGENT_SYSTEM.md || (echo "FAIL: AGENT_SYSTEM.md missing" && exit 1)
        test -d spec || (echo "FAIL: spec/ missing" && exit 1)
        test -d evals || (echo "FAIL: evals/ missing" && exit 1)
        test -d decisions || (echo "FAIL: decisions/ missing" && exit 1)
        test -f MEMORY.md || (echo "FAIL: MEMORY.md missing" && exit 1)
        echo "All required structure present."
  lint-test:
    needs: structure-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: uv sync --frozen
      - name: Lint
        run: uv run ruff check .
      - name: Format check
        run: uv run ruff format --check .
      - name: Test
        run: uv run pytest tests/ -v
